name: CD - Deploy to Local IIS (self-hosted)

on:
  workflow_run:
    workflows: ["CI - Build Angular"]
    types: [completed]

  workflow_dispatch:

jobs:
  deploy:
    # Requiere que tu runner Windows esté activo
    runs-on: [self-hosted, windows]
    permissions:
      actions: read
      contents: read

    # Evita desplegar si el build falló (cuando viene desde workflow_run)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download build artifact (from CI run)
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: _artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine dist folder (best-effort)
        shell: powershell
        run: |
          Write-Host "Artifact content:"
          Get-ChildItem -Recurse -Depth 3 _artifact | Select-Object FullName

      - name: Deploy files to IIS directory
        shell: powershell
        run: |
          $Target = "D:\CI_DI_LoginHM"
          New-Item -ItemType Directory -Force -Path $Target | Out-Null

          # Limpia destino (opcional). OJO si tienes otros archivos ahí.
          if (Test-Path $Target) {
            Get-ChildItem -Path $Target -Force | Remove-Item -Recurse -Force
          }

          $ArtifactRoot = "_artifact"

          # Caso A: el artifact contiene dist/ (layout clásico)
          if (Test-Path (Join-Path $ArtifactRoot "dist")) {
            $distRoot = Join-Path $ArtifactRoot "dist"

            # 1) dist/*/browser
            $browser = Get-ChildItem -Path $distRoot -Directory -ErrorAction SilentlyContinue | ForEach-Object {
              Join-Path $_.FullName "browser"
            } | Where-Object { Test-Path $_ } | Select-Object -First 1

            if ($browser) {
              Copy-Item -Path (Join-Path $browser "*") -Destination $Target -Recurse -Force
              Write-Host "Deployed from: $browser"
              exit 0
            }

            # 2) dist/<app-name> (primer directorio dentro de dist)
            $appDist = Get-ChildItem -Path $distRoot -Directory | Select-Object -First 1
            if (-not $appDist) { throw "No app dist folder found under $distRoot" }

            Copy-Item -Path (Join-Path $appDist.FullName "*") -Destination $Target -Recurse -Force
            Write-Host "Deployed from: $($appDist.FullName)"
            exit 0
          }

          # Caso B: el artifact NO trae dist/ (tu caso actual: _artifact/<app>/browser)
          $appRoot = Get-ChildItem -Path $ArtifactRoot -Directory | Select-Object -First 1
          if (-not $appRoot) { throw "No app folder found under $ArtifactRoot" }

          $browserPath = Join-Path $appRoot.FullName "browser"
          if (Test-Path $browserPath) {
            Copy-Item -Path (Join-Path $browserPath "*") -Destination $Target -Recurse -Force
            Write-Host "Deployed from: $browserPath"
            exit 0
          }

          # Si no hay browser/, copia todo el contenido de la carpeta de app
          Copy-Item -Path (Join-Path $appRoot.FullName "*") -Destination $Target -Recurse -Force
          Write-Host "Deployed from: $($appRoot.FullName)"

      - name: Add web.config for Angular SPA routes (IIS rewrite)
        shell: powershell
        run: |
          $Target = "D:\CI_DI_LoginHM"
          $WebConfigPath = Join-Path $Target "web.config"

          $lines = @(
            '<?xml version="1.0" encoding="utf-8"?>'
            '<configuration>'
            '  <system.webServer>'
            '    <rewrite>'
            '      <rules>'
            '        <rule name="Angular Routes" stopProcessing="true">'
            '          <match url=".*" />'
            '          <conditions logicalGrouping="MatchAll">'
            '            <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="true" />'
            '            <add input="{REQUEST_FILENAME}" matchType="IsDirectory" negate="true" />'
            '          </conditions>'
            '          <action type="Rewrite" url="/index.html" />'
            '        </rule>'
            '      </rules>'
            '    </rewrite>'
            '  </system.webServer>'
            '</configuration>'
          )

          $lines | Set-Content -Path $WebConfigPath -Encoding UTF8
          Write-Host "web.config written to $WebConfigPath"
